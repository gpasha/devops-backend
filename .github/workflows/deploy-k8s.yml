name: Deploy
 
on:
  workflow_call:
    inputs:
      image_sha:
        required: true
        type: string
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/backend backend=${{ inputs.image_sha }}
          kubectl rollout status deployment/backend --timeout=120s
