name: Deploy (k8s)

on:
  workflow_call:
    inputs:
      image_sha:
        required: true
        type: string
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Deploy to k3s
        env:
          IMAGE: ${{ inputs.image_sha }}
        run: |
          envsubst '$IMAGE' < manifests/backend.yaml | kubectl apply -f -
          kubectl rollout status deployment/backend-api --timeout=300s
