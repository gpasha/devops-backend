name: PR Checks

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v3
      
      - name: Installization
        run: npm ci

      - name: Linter checks
        run: npm run lint

      - name: Unit tests
        run: npm run test