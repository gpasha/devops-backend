name: PR Checks

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 23, 24]
        include:
          - node-version: 24
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version}}
      
      - name: Installization
        run: npm ci

      - name: Linter checks
        run: npm run lint

      - name: Unit tests
        run: npm run test