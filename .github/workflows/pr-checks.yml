name: PR Checks

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Clone repository
        uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@4
        with:
          node-version: ${{ matrix.node-version}}
      
      - name: Installization
        run: npm ci

      - name: Linter checks
        run: npm run lint

      - name: Unit tests
        run: npm run test