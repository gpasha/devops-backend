name: Notify
 
on:
  workflow_call:
    inputs:
      checks_result:
        required: true
        type: string
      build_result:
        required: true
        type: string
      deploy_result:
        required: true
        type: string
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true
 
jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram
        run: |
          CHECKS_STATUS="${{ inputs.checks_result }}"
          BUILD_STATUS="${{ inputs.build_result}}"
          DEPLOY_STATUS="${{ inputs.deploy_result}}"

          if [ "$CHECKS_STATUS" != "success" ]; then
            TEXT="❌ Тесты упали%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$BUILD_STATUS" != "success" ]; then
            TEXT="❌ Билд упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY_STATUS" != "success" ]; then
            TEXT="❌ Деплой упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            TEXT="✅ Деплой успешен%0A${{ github.repository }} @ ${{ github.ref_name }}%0AСделал: ${{ github.actor }}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT"
