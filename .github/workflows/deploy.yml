name: Deploy
 
on:
  workflow_call:
    inputs:
      image_sha:
        required: true
        type: string
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TARGET_IMAGE: ${{ inputs.image_sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: TARGET_IMAGE
          script: |
            cd /var/www/myapp
            sed -i "s|BACKEND_IMAGE=.*|BACKEND_IMAGE=$TARGET_IMAGE|" .env
            docker compose up -d --no-deps backend
